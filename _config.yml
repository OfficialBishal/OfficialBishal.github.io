# Site settings
title: Bishal Shrestha
description: >-
  Hi! I am Bishal Shrestha and currently Computer Engineering student,
  meet me <a href="https://github.com/OfficialBishal" target="_blank" rel="noopener">@github</a>.
lang: en-US
timezone: Asia/Kathmandu
image: assets/img/ogp.png # This image used for Open Graph more info https://ogp.me/
repo: https://github.com/OfficialBishal/OfficialBishal.github.io
mode: dark # default theme "dark" | "light"

# Profile settings
author:
  name: Bishal Shrestha
  bio: >-
    Hi! I am Bishal Shrestha, currently Computer Engineering student and I'm in journey of innovation,
    meet me <a href="https://github.com/OfficialBishal" target="_blank" rel="noopener">@github</a>.
  username: OfficialBishal
  email: bishal.modern@gmail.com
  avatar: /assets/img/avatar.jpg

# Url settings
url: "http://sthabishal.com.np/"
baseurl:
permalink: /:title/
google_analytics:
fb_appid:

# Collection setting
collections:
  posts:
    output: true

# Markdown settings
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      layout: post
      comments: false
  # _pages
  # - scope:
  #   path: ""
  #   type: pages
  # values:
  #   layout: single
  #   comments: false
  #   author_profile: true


# Jekyll Compose default front matter
jekyll_compose:
  post_default_front_matter:
    modified:
    tags: []
    description:
  draft_default_front_matter:
    modified:
    tags: []
    description:

# Build settings
sass:
  style: compressed

include:
  - _redirects
  - .htaccess

exclude:
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - CHANGELOG.md
  - README.md
  - node_modules
  - CODE_OF_CONDUCT.md

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sass-converter
  - jekyll-sitemap
  - jekyll-postfiles
