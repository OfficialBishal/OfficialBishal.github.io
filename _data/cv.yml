- title: Research Experience
  type: time_table
  contents:
    - title: Research Assistant
      institution: University of Miami, Coral Gables, FL
      year: Aug 2023 - Present
      description:
        - Designed and implemented an ensemble of graph neural network architectures to estimate per-residue local accuracy of predicted protein structures as part of <strong>CASP 16</strong>, the leading community-wide blind assessment in computational structural biology; led this work as <strong>first author</strong> of <strong>ARC</strong> (Assessment of Interface Residue Conformation using an Ensemble of Graph Neural Networks), under review at <em>PROTEINS&#58; Structure, Function, and Bioinformatics</em>.
        - Applied <strong>Geometric Algebra Transformers (GATr)</strong> to annotate protein function from 3D structures, leveraging E(3)-equivariant geometric deep learning to operate directly on atomic coordinates.
        - Co-developed a <strong>Graph Transformer</strong> model to assess the quality of predicted <strong>protein–RNA complex</strong> structures, published in <em>Bioinformatics</em> (2026), extending structure-quality estimation beyond proteins to multi-biomolecule systems.
        - Developed <strong>HiC4D-SPOT</strong>, an unsupervised deep-learning framework using ConvLSTM-based autoencoders to detect spatiotemporal anomalies in 3D chromatin (Hi-C) structure data, published in <em>Briefings in Bioinformatics</em> (2025); achieved high reconstruction fidelity (PCC/SCC > 0.9) and accurately identified structural anomalies including TAD disruptions and chromatin remodeling events.
        - Developed <strong>scHiGex</strong>, a Graph Transformer model that predicts single-cell gene expression directly from single-cell Hi-C 3D structure data, published in <em>NAR Genomics and Bioinformatics</em> (2025); achieved average absolute error of 0.07 and precise cell-type classification (adjusted Rand index = 1).
        - Contributed to <strong>SCW</strong>, a method for reconstructing whole-genome 3D structures from extremely sparse single-cell Hi-C data, published in <em>BMC Bioinformatics</em> (2026).
        - Contributed to <strong>CITED2 study</strong> (Müller et al., <em>EMBO Molecular Medicine</em> 2026) on a druggable epigenetic switch coupling neuronal maturation to regenerative decline, integrating computational analysis with wet-lab experimental data.
    - title: Research Intern
      institution: University of Missouri - St. Louis, MO
      year: Sep 2021 - Aug 2022
      description:
        - Conducted research on adversarial sample generation for Nepal's embossed license plate recognition system, employing adversarial training to enhance model robustness against attack scenarios.
        - Designed and executed deep learning experiments using convolutional neural networks (CNNs) in PyTorch, including collecting and preprocessing a novel dataset for real-world applications.
    - title: Student Researcher
      institution: Research and Innovation Unit, Tribhuvan University
      year: Apr 2021 - Sep 2021
      description:
        - Investigated machine learning techniques for customer churn prediction, collaborating with a leading Nepali ISP to optimize business operations through predictive analytics.
        - Presented findings at the Himalaya International Conference, highlighting the impact of academia-industry partnerships in addressing real-world problems.

