- title: Research Interests
  type: list
  contents:
    - <strong>AI for structural biology</strong>, structure-centric multimodal foundation models, deep learning for biomolecular structure prediction (proteins, protein–RNA complexes, 3D genome), geometric deep learning and graph transformers, generative models for molecular design, protein function annotation, and translating structural and experimental data into scalable model architectures for biology.

